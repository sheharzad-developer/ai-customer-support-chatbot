#! db-deployment.yaml
# Generated code, do not edit
apiVersion: apps/v1
kind: Deployment
metadata:
    name: db
    namespace: ai-customer-support-chatbot-rag
    labels:
        com.docker.compose.project: ai-customer-support-chatbot-rag
        com.docker.compose.service: db
spec:
    replicas: 1
    selector:
        matchLabels:
            com.docker.compose.project: ai-customer-support-chatbot-rag
            com.docker.compose.service: db
    strategy:
        type: Recreate
    template:
        metadata:
            labels:
                com.docker.compose.project: ai-customer-support-chatbot-rag
                com.docker.compose.service: db
                com.docker.compose.network.default: "true"
        spec:
            restartPolicy: unless-stopped
            containers:
                - name: db
                  image: pgvector/pgvector:pg16
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: POSTGRES_DB
                      value: "ragbot"
                    - name: POSTGRES_PASSWORD
                      value: "postgres"
                    - name: POSTGRES_USER
                      value: "postgres"
                  livenessProbe:
                    exec:
                        command:
                            - /bin/sh
                            - -c
                            - pg_isready -U postgres -d ragbot
                    periodSeconds: 5
                    timeoutSeconds: 5
                    failureThreshold: 10
                  ports:
                    - name: db-5432
                      containerPort: 5432
                  volumeMounts:
                    - name: var-lib-postgresql-data
                      mountPath: /var/lib/postgresql/data
            volumes:
                - name: var-lib-postgresql-data
                  persistentVolumeClaim:
                    claimName: db-pgdata
